  <!-- base -->
  <path stroke-width="20" d="M148 397H364"/>
  <path stroke-width="24" d="M130 430H382"/>
  <path stroke-width="24" d="M150 462H362"/>

</g>
<text x="450" y="720" text-anchor="middle" fill="#F5F2EB"
      font-family="Georgia, 'Times New Roman', serif" font-size="112" letter-spacing="18">ASKLEION</text>
<line x1="120" y1="810" x2="260" y2="810" stroke="#CDAA63" stroke-width="6"/>
<text x="450" y="827" text-anchor="middle" fill="#CDAA63"
      font-family="Arial, Helvetica, sans-serif" font-size="30" letter-spacing="10">BIBLIOTECA MÉDICA</text>
<line x1="640" y1="810" x2="780" y2="810" stroke="#CDAA63" stroke-width="6"/>
</svg>