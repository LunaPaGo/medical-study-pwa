<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" role="img" aria-labelledby="title desc">
<title id="title">Askleion — Biblioteca Médica</title>
<desc id="desc">Logotipo vertical de Askleion.</desc>
<rect width="900" height="1100" fill="#F5F2EB"/>
<g transform="translate(220,30) scale(.9)">
 fill="none" stroke="#F5F2EB" stroke-linecap="round" stroke-linejoin="round">
  <!-- top cap -->
  <path stroke-width="24" d="M146 72H366"/>
  <path stroke-width="20" d="M126 106H386"/>
  <!-- ionic volutes -->
  <path stroke-width="18" d="M171 108c-30-4-55 12-55 38 0 20 16 34 34 34 17 0 31-12 31-28 0-13-10-23-23-23-10 0-18 7-18 16"/>
  <path stroke-width="18" d="M341 108c30-4 55 12 55 38 0 20-16 34-34 34-17 0-31-12-31-28 0-13 10-23 23-23 10 0 18 7 18 16"/>
  <path stroke-width="14" d="M160 181H352"/>
  <!-- side pillars -->
  <path stroke-width="22" d="M168 184V390"/>
  <path stroke-width="22" d="M344 184V390"/>
  <path stroke-width="14" d="M205 190V384"/>
  <path stroke-width="14" d="M307 190V384"/>
  <!-- abstract inner ribbon -->
  <path stroke-width="26" d="M270 196
    C226 225 225 258 268 281
    C307 302 302 337 257 360
    C225 377 226 400 251 414"/>
  <path stroke-width="16" d="M248 205
    C280 230 283 256 254 278
    C226 299 231 330 271 351
